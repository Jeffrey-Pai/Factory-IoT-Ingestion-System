# RabbitMQ broker configuration (sysctl / new-style format).
#
# By default RabbitMQ only lets the built-in `guest` user authenticate over a
# loopback (localhost) connection. In docker-compose the API and simulator run in
# their own containers and reach the broker across the Docker network, which counts
# as a *remote* connection, so guest/guest is refused with `ACCESS_REFUSED` and the
# consumer can never start — messages pile up in the queue and nothing reaches MSSQL.
#
# Disabling the loopback restriction lets guest connect from the other containers.
# For anything beyond local development, create a dedicated user instead and set
# RABBITMQ_USER / RABBITMQ_PASS on the services.
loopback_users.guest = false
